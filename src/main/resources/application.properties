spring.application.name=sb-ecom
server.port=${PORT:8080}

# Database (uses env vars on Render, defaults to local MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Future@prediction}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.MySQLDialect}

project.image = images/

spring.jpa.show-sql = false
spring.jpa.properties.hibernate.format-sql = false
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

spring.app.jwtSecret = ${JWT_SECRET:mySecretKey123912738aopsgjnspkmndfsopkvajoirjg94gf2opfng2moknm}
spring.app.jwtExpirationMs = 3000000
spring.ecom.app.jwtCookieName = springBootEcom

frontend.url = ${FRONTEND_URL:http://localhost:5173/}
image.base.url = ${IMAGE_BASE_URL:http://localhost:8080/images}

#STRIPE Key
stripe.secret.key=${STRIPE_SECRET_KEY}